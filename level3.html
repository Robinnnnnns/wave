<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Harmonic2</title>
    <link rel="stylesheet" type="text/css" href="style.css">
<script src="libraries/p5.min.js"></script>
</head>
<body>

    <div class="ui">
        <label>y = Σ (1/n) * sin(n * Bx - t)</label>
        
        <div class="control-group">
            <label>f1 (Fundamental): <span id="v1">100</span></label>
            <input type="range" id="amp1" min="0" max="150" value="100">
        </div>
        <div class="control-group">
            <label>f3 (3rd Harmonic): <span id="v3">30</span></label>
            <input type="range" id="amp3" min="0" max="80" value="30">
        </div>
        <div class="control-group">
            <label>f5 (5th Harmonic): <span id="v5">20</span></label>
            <input type="range" id="amp5" min="0" max="60" value="20">
        </div>
        <div id="status"> </div>

        <button id="nextBtn" style="display: none;">NEXT LEVEL</button>
    </div>

    <div id="canvasContainer"></div>

    <script>
        const sliders = [
            document.getElementById('amp1'),
            document.getElementById('amp3'),
            document.getElementById('amp5')
        ];
        const labels = [
            document.getElementById('v1'),
            document.getElementById('v3'),
            document.getElementById('v5')
        ];

        const sketch = (p) => {
            // 常量
            const GRAVITY = 0.4;
            const DAMPING = 0.96;
            const OFFSET_Y = 250; // 抬高基准线，下方留出尖刺空间
            const FREQ_B = 0.015; // 较长的波长更像桥
            
            const START_PLAT = { x: 0, y: 200, w: 100, h: 15 };
            const END_PLAT = { x: 700, y: 170, w: 100, h: 15 };

            // 状态
            let amps = [100, 30, 20];
            let curAmps = [100, 30, 20];
            let ball = { x: 50, y: 150, vx: 1.2, vy: 0, r: 10 };
            let hasWon = false;

            p.setup = () => {
                p.createCanvas(800, 450).parent('canvasContainer');
                sliders.forEach((s, i) => {
                    s.oninput = (e) => {
                        amps[i] = parseFloat(e.target.value);
                        labels[i].innerText = Math.round(amps[i]);
                    };
                });
                nextBtn.onclick = () => window.location.href = 'level4.html';

            };

            p.draw = () => {
                p.clear();
                p.background(0, 0, 0, 100);
                
                // 平滑更新振幅
                for(let i=0; i<amps.length; i++) {
                    curAmps[i] = p.lerp(curAmps[i], amps[i], 0.1);
                }

                drawSpikes(); // 绘制危险尖刺
                updatePhysics();
                drawNeonPlatform(START_PLAT, '#44FF44');
                drawNeonPlatform(END_PLAT, '#FF00FF');
                drawWave();
                drawResonanceBall();
            };

            function getWaveY(x) {
                let t = p.frameCount * 0.03;
                // 傅里叶级数合成：f, 3f, 5f...
                let y1 = curAmps[0] * p.sin(x * FREQ_B - t);
                let y3 = curAmps[1] * p.sin(x * (FREQ_B * 3) - t);
                let y5 = curAmps[2] * p.sin(x * (FREQ_B * 5) - t);
                return OFFSET_Y - (y1 + y3 + y5);
            }

            function drawWave() {
                p.noFill();
                p.strokeWeight(4);
                p.stroke(0, 255, 255, 180);
                p.beginShape();
                for (let x = 0; x <= p.width; x += 4) {
                    p.vertex(x, getWaveY(x));
                }
                p.endShape();
            }

            function drawSpikes() {
                p.fill(255, 0, 0, 100);
                p.noStroke();
                for (let x = 100; x < 650; x += 20) {
                    p.triangle(x, 400, x + 10, 320, x + 20, 400);
                }
            }

            function drawResonanceBall() {
                p.push();
                p.noStroke();
                // 匹配度检定：方波理想比例是 1 : 1/3 : 1/5
                // 检查 A3 是否接近 A1/3，A5 是否接近 A1/5
                let error = p.abs(curAmps[1] - curAmps[0]/3) + p.abs(curAmps[2] - curAmps[0]/5);
                let resonance = p.map(p.constrain(error, 0, 40), 0, 40, 200, 50);
                let tremble = p.map(p.constrain(error, 0, 10), 0, 10, 2, 0);

                p.fill(255, 150, 255, resonance);
                p.ellipse(ball.x + p.random(-tremble, tremble), ball.y + p.random(-tremble, tremble), ball.r * 1.8);
                p.fill(255, 255, 255, 220);
                p.ellipse(ball.x, ball.y, ball.r * 1.2);
                p.pop();
            }

            function updatePhysics() {
                if (hasWon) return;

                ball.vy += GRAVITY;
                ball.y += ball.vy;
                ball.x += ball.vx;

                let waveY = getWaveY(ball.x);

                // 死亡判定：撞到尖刺（低过波浪一定距离或碰到Y范围）
                if (ball.y > 300) { resetBall(); return; }

                // 起始平台
                if (ball.x < START_PLAT.w && ball.y + ball.r > START_PLAT.y && ball.vy > 0) {
                    ball.y = START_PLAT.y - ball.r;
                    ball.vy = 0;
                }

                // 波浪桥梁物理
                if (ball.y + ball.r > waveY) {
                    ball.y = waveY - ball.r;
                    if (ball.vy > 0) ball.vy = 0;
                    
                    let slope = (getWaveY(ball.x + 1) - getWaveY(ball.x - 1)) / 2;
                    // 如果坡度太陡（波不平），小球会剧烈减速或反弹
                    ball.vx -= slope * 0.4; 
                    ball.vx = p.constrain(ball.vx, -3, 3);
                    ball.vx *= DAMPING;
                }

                // 胜利检测
                if (ball.x > END_PLAT.x && ball.x < END_PLAT.x + END_PLAT.w) {
                    if (p.abs(ball.y + ball.r - END_PLAT.y) < 15 && ball.vy >= 0) {
                        ball.y = END_PLAT.y - ball.r;
                        hasWon = true;
                        document.getElementById('status').innerText = "Bingo!";
                        document.getElementById('status').className = "win";
                        document.getElementById('nextBtn').style.display = "inline-block";
                    }
                }

                if (ball.x > p.width + 50 || ball.x < -50) resetBall();
            }

            function resetBall() {
                ball.x = 50; ball.y = 150; ball.vx = 1.2; ball.vy = 0;
            }

            function drawNeonPlatform(plat, color) {
                p.push();
                p.noStroke();
                p.drawingContext.shadowBlur = 15;
                p.drawingContext.shadowColor = color;
                p.fill(color);
                p.rect(plat.x, plat.y, plat.w, plat.h, 2);
                p.pop();
            }
        };

        new p5(sketch);
    </script>
</body>
</html>
