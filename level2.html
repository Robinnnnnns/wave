<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Harmonic1</title>
    <link rel="stylesheet" type="text/css" href="style.css">
<script src="libraries/p5.min.js"></script>
</head>
<body>

    <div class="ui">
        <label>y = <span id="a1Val">100</span>sin(Bx) + <span id="a2Val">0</span>sin(2Bx)</label>
        
        <div class="control-group">
            <label>Fundamental:</label>
            <input type="range" id="amp1" min="0" max="150" value="100">
        </div>

        <div class="control-group">
            <label>2nd Harmonic:</label>
            <input type="range" id="amp2" min="0" max="100" value="0">
        </div>

        <div id="status"> </div>
        <button id="nextBtn" style="display: none;">NEXT LEVEL</button>
    </div>

    <div id="canvasContainer"></div>

    <script>
        const amp1Slider = document.getElementById('amp1');
        const amp2Slider = document.getElementById('amp2');
        const a1Label = document.getElementById('a1Val');
        const a2Label = document.getElementById('a2Val');
        const statusLabel = document.getElementById('status');
        const nextBtn = document.getElementById('nextBtn');

        const sketch = (p) => {
            // --- 物理常量 ---
            const GRAVITY = 0.5;
            const DAMPING = 0.98;
            const OFFSET_Y = 320; 
            const START_POS = { x: 40, y: 150 };
            const FREQ_B = 0.02;

            // 平台定义：目标设在高度 250px 处 (320 - 70 = 250)
            const START_PLAT = { x: 0, y: 200, w: 100, h: 15 };
            const END_PLAT = { x: 650, y: 120, w: 100, h: 15 };

            // --- 状态变量 ---
            let targetA1 = 100, targetA2 = 0;
            let currentA1 = 100, currentA2 = 0;
            let ball = { x: START_POS.x, y: START_POS.y, vx: 0.7, vy: 0, r: 10 };
            let hasWon = false;

            p.setup = () => {
                p.createCanvas(800, 450).parent('canvasContainer');
                
                amp1Slider.oninput = (e) => {
                    targetA1 = parseFloat(e.target.value);
                    a1Label.innerText = Math.round(targetA1);
                };
                amp2Slider.oninput = (e) => {
                    targetA2 = parseFloat(e.target.value);
                    a2Label.innerText = Math.round(targetA2);
                };
                nextBtn.onclick = () => window.location.href = 'level3.html';
            };

            p.draw = () => {
                // 平滑参数过渡
                currentA1 = p.lerp(currentA1, targetA1, 0.1);
                currentA2 = p.lerp(currentA2, targetA2, 0.1);

                p.clear();
                p.background(0, 0, 0, 100);
                
                updatePhysics();

                // 绘制平台
                drawNeonPlatform(START_PLAT, '#44FF44');
                drawNeonPlatform(END_PLAT, '#FF00FF');
                
                // 绘制合成波
                drawWave();

                // 绘制奶油色共鸣小球
                drawResonanceBall();
            };

            function getWaveY(x) {
                let t = p.frameCount * 0.025; // 较慢的波速
                // 叠加公式：基波 + 二次谐波
                let wave1 = currentA1 * p.sin(x * FREQ_B - t);
                let wave2 = currentA2 * p.sin(x * (FREQ_B * 2)- t);
                return OFFSET_Y - (wave1 + wave2);
            }

            function drawWave() {
                p.noFill();
                p.strokeWeight(4);
                p.stroke(0, 255, 255, 180);
                p.beginShape();
                for (let x = 0; x <= p.width; x += 5) {
                    p.vertex(x, getWaveY(x));
                }
                p.endShape();
            }

            function drawResonanceBall() {
                p.push();
                p.noStroke();

                // 计算共鸣：只有当 A1+A2 接近 250 时（相长干涉最大化）
                let combinedAmp = currentA1 + currentA2;
                let diff = p.abs(240 - combinedAmp); // 目标是总高度 240-250 左右
                
                let resonance = p.map(p.constrain(diff, 0, 50), 0, 50, 160, 40);
                let tremble = p.map(p.constrain(diff, 0, 15), 0, 15, 1.5, 0);

                // 
                p.fill(255, 150, 255, resonance*0.5);
                let tx = p.random(-tremble, tremble);
                let ty = p.random(-tremble, tremble);
                p.ellipse(ball.x + tx, ball.y + ty, ball.r * 2);

                // 白色核心
                p.fill(255, 255, 255, 220);
                p.ellipse(ball.x, ball.y, ball.r * 1.2);
                p.pop();
            }

            function updatePhysics() {
                if (hasWon) return;

                // 基础物理
                ball.vy += GRAVITY;
                ball.vy = p.constrain(ball.vy, -6, 6);
                ball.y += ball.vy;
                ball.x += ball.vx;

                let waveY = getWaveY(ball.x);

                // 起始平台碰撞
                if (ball.x < START_PLAT.w && ball.vy > 0) {
                    if (ball.y + ball.r > START_PLAT.y) {
                        ball.y = START_PLAT.y - ball.r;
                        ball.vy = 0;
                    }
                }

                // 波浪“桥梁”碰撞逻辑 (不弹起)
                if (ball.y + ball.r > waveY) {
                    ball.y = waveY - ball.r;
                    if (ball.vy > 0) ball.vy = 0.2;
                    
                    let slope = (getWaveY(ball.x + 1) - getWaveY(ball.x - 1)) / 2;
                    ball.vx -= slope * 0.15;
                    ball.vx *= DAMPING;
                }

                // 胜利检测 (高平台)
                if (ball.x > END_PLAT.x && ball.x < END_PLAT.x + END_PLAT.w) {
                    if (p.abs(ball.y + ball.r - END_PLAT.y) < 15 && ball.vy >= 0) {
                        ball.y = END_PLAT.y - ball.r;
                        ball.vy = 0; ball.vx = 0;
                        hasWon = true;
                        statusLabel.innerText = "Bingo!";
                        statusLabel.classList.add('win');
                        nextBtn.style.display = "inline-block";
                    }
                }

                // 边界重置
                if (ball.y > p.height  || ball.x < -50 || ball.x > p.width + 50) {
                    ball.x = START_POS.x;
                    ball.y = START_POS.y;
                    ball.vx = 0.7;
                    ball.vy = 0;
                }
            }

            function drawNeonPlatform(plat, color) {
                p.push();
                p.noStroke();
                p.drawingContext.shadowBlur = 15;
                p.drawingContext.shadowColor = color;
                p.fill(color);
                p.rect(plat.x, plat.y, plat.w, plat.h, 2);
                p.pop();
            }
        };

        new p5(sketch);
    </script>
</body>
</html>
