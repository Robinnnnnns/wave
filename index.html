<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cover</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="libraries/p5.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #0C0526;
        }

        body {
            font-family: monospace;
            color: white;
        }

        .page-wrap {
            width: 948px;
            margin: 0 auto;
            padding: 20px 0 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            box-sizing: border-box;
        }

        #canvasContainer {
            width: 800px;
            height: 400px;
            border: 2px solid #00FFFF;
            background: #1A103D;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.25);
            line-height: 0;
            overflow: hidden;
        }

        #canvasContainer canvas {
            display: block;
        }

        #nextBtn {
            font-size: 1.5rem;
            padding: 10px 32px;
        }

        .level-select {
            display: flex;
            gap: 25px;
            margin-top: 6px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .level-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #77FFFF;
            border: 2px solid white;
            box-shadow: 2px 2px 0 #000;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .level-dot:hover {
            transform: scale(1.1);
            background: #ff00ff;
        }

        .title-label {
            color: #77FFFF;
            font-size: 1rem;
            letter-spacing: 1px;
            text-shadow: 1px 1px #000;
        }
    </style>
</head>
<body>

    <div class="page-wrap">
        <div class="title-label">FUNCTION SIGNAL LAB</div>

        <div id="canvasContainer"></div>

        <button id="nextBtn">START</button>

        <div class="level-select">
            <div class="level-dot" onclick="location.href='demo.html'" data-lv="1" title="Level 1"></div>
            <div class="level-dot" onclick="location.href='level1.html'" data-lv="2" title="Level 2"></div>
            <div class="level-dot" onclick="location.href='level2.html'" data-lv="3" title="Level 3"></div>
            <div class="level-dot" onclick="location.href='level3.html'" data-lv="4" title="Level 4"></div>
            <div class="level-dot" onclick="location.href='level4.html'" data-lv="5" title="Level 5"></div>
        </div>
    </div>

    <script>
        const sketch = (p) => {
            const CANVAS_W = 800;
            const CANVAS_H = 400;

            const FREQUENCY = 0.02;
            const OFFSET_Y = 200;
            const AMPLITUDE = 80;

            let bg = null;
            let bgLoaded = false;

            p.preload = () => {
                bg = p.loadImage(
                    'assets/background.png',
                    () => { bgLoaded = true; },
                    () => { bgLoaded = false; }
                );
            };

            p.setup = () => {
                const canvas = p.createCanvas(CANVAS_W, CANVAS_H);
                canvas.parent('canvasContainer');
            };

            p.draw = () => {
                drawBackground();
                drawHandDrawnWave();
            };

            function drawBackground() {
                p.background(12, 5, 38);

                if (bgLoaded && bg) {
                    p.push();
                    p.tint(255, 150);
                    p.image(bg, 0, 0, p.width, p.height);
                    p.pop();
                }
            }

            function getWaveY(x) {
                const dynamicPhase = p.frameCount * 0.05;
                return OFFSET_Y - (AMPLITUDE * p.sin(x * FREQUENCY + dynamicPhase));
            }

            function drawHandDrawnWave() {
                p.noFill();
                p.strokeWeight(3);

                for (let i = 0; i < 2; i++) {
                    p.stroke(0, 255, 255, 180 - i * 80);

                    p.beginShape();
                    for (let x = 0; x <= p.width; x += 5) {
                        const baseY = getWaveY(x);
                        const noiseVal = p.noise(x * 0.05, p.frameCount * 0.08 + i);
                        const jitter = p.map(noiseVal, 0, 1, -1.5, 1.5);
                        p.vertex(x, baseY + jitter);
                    }
                    p.endShape();
                }
            }
        };

        document.getElementById('nextBtn').addEventListener('click', () => {
            window.location.href = 'demo.html';
        });

        new p5(sketch);
    </script>
</body>
</html>
